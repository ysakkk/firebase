<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background gradient (using solid color as fallback) -->
  <rect width="800" height="400" fill="#FF6B35"/>

  <!-- Gradient effect with shapes -->
  <rect width="800" height="200" fill="#FF8C42" opacity="0.8"/>
  <circle cx="0" cy="0" r="300" fill="#FF6B35" opacity="0.3"/>
  <circle cx="800" cy="400" r="300" fill="#FF8C42" opacity="0.3"/>

  <!-- Left content: Hamburger -->
  <g transform="translate(150, 200)">
    <!-- Top bun -->
    <ellipse cx="0" cy="-40" rx="45" ry="28" fill="#D4A574"/>
    <path d="M -35 -40 Q -35 -65 0 -70 Q 35 -65 35 -40" fill="#C9915F"/>
    <!-- Sesame -->
    <circle cx="-20" cy="-50" r="2.5" fill="#F5DEB3"/>
    <circle cx="0" cy="-55" r="2.5" fill="#F5DEB3"/>
    <circle cx="20" cy="-50" r="2.5" fill="#F5DEB3"/>
    <!-- Lettuce -->
    <path d="M -30 -10 Q -15 -20 0 -20 Q 15 -20 30 -10 L 28 0 Q 0 -5 -28 0 Z" fill="#7CB342"/>
    <!-- Cheese -->
    <rect x="-28" y="0" width="56" height="10" rx="1" fill="#FDD835"/>
    <!-- Patty -->
    <rect x="-32" y="10" width="64" height="18" rx="2" fill="#8B4513"/>
    <!-- Bottom bun -->
    <ellipse cx="0" cy="35" rx="45" ry="28" fill="#D4A574"/>
  </g>

  <!-- Center: Large text with arrow -->
  <g transform="translate(400, 200)">
    <text x="0" y="-80" font-size="72" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">GET</text>
    <text x="0" y="0" font-size="64" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">車の</text>
    <text x="0" y="60" font-size="48" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">おもちゃ</text>

    <!-- Arrow -->
    <g transform="translate(-120, 0)">
      <path d="M 0 -30 L 0 30 M -20 10 L 0 30 L 20 10" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Right content: Sports car -->
  <g transform="translate(650, 200)">
    <!-- Car body -->
    <path d="M -35 5 L -20 -20 L 20 -20 L 35 5 Z" fill="#FF0000" stroke="#CC0000" stroke-width="1.5"/>
    <!-- Car top -->
    <path d="M -15 -20 L -8 -35 L 8 -35 L 15 -20 Z" fill="#FF3333"/>
    <!-- Front wheel -->
    <circle cx="-20" cy="20" r="12" fill="#222222"/>
    <circle cx="-20" cy="20" r="8" fill="#555555"/>
    <!-- Rear wheel -->
    <circle cx="20" cy="20" r="12" fill="#222222"/>
    <circle cx="20" cy="20" r="8" fill="#555555"/>
    <!-- Windows -->
    <path d="M -12 -30 L -8 -20 L 8 -20 L 10 -30 Z" fill="#87CEEB" opacity="0.6"/>
    <!-- Headlights -->
    <ellipse cx="-30" cy="0" rx="4" ry="5" fill="#FFFF00"/>
    <ellipse cx="-22" cy="0" rx="4" ry="5" fill="#FFFF00"/>
  </g>

  <!-- Bottom promotional text -->
  <text x="400" y="370" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">3月1日〜5月31日</text>
</svg>
