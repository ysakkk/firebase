<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Gift box -->
  <rect x="30" y="80" width="140" height="120" rx="5" fill="#E53935" stroke="#C62828" stroke-width="2"/>

  <!-- Box highlight -->
  <rect x="30" y="80" width="140" height="30" rx="5" fill="#FF5252" opacity="0.5"/>

  <!-- Ribbon horizontal -->
  <rect x="25" y="135" width="150" height="10" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>

  <!-- Ribbon vertical -->
  <rect x="93" y="60" width="14" height="150" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>

  <!-- Bow top -->
  <ellipse cx="80" cy="65" rx="15" ry="12" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  <ellipse cx="120" cy="65" rx="15" ry="12" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  <circle cx="100" cy="68" r="8" fill="#FFA500"/>

  <!-- Car inside box (peeking out) -->
  <g transform="translate(100, 130)">
    <!-- Front part of car visible -->
    <path d="M -25 -5 L -15 -20 L 15 -20 L 25 -5 Z" fill="#FF0000" stroke="#CC0000" stroke-width="1.5"/>
    <circle cx="-12" cy="5" r="8" fill="#333333"/>
    <circle cx="12" cy="5" r="8" fill="#333333"/>
    <ellipse cx="-18" cy="-8" rx="3" ry="4" fill="#FFFF00"/>
  </g>

  <!-- Sparkles around -->
  <g fill="#FFD700">
    <polygon points="20,50 25,55 20,60 15,55" transform="translate(0,0)"/>
    <polygon points="170,100 175,105 170,110 165,105" transform="translate(0,0)"/>
    <polygon points="30,180 33,183 30,186 27,183" transform="translate(0,0)"/>
    <polygon points="160,160 163,163 160,166 157,163" transform="translate(0,0)"/>
  </g>

  <!-- "PRIZE" text -->
  <text x="100" y="220" font-size="24" font-weight="bold" fill="#E53935" text-anchor="middle" font-family="Arial">景品</text>
</svg>
