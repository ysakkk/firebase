<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150">
  <!-- Ground shadow -->
  <ellipse cx="150" cy="140" rx="100" ry="8" fill="#00000015"/>

  <!-- Car body -->
  <path d="M 50 90 L 80 60 L 220 60 L 250 90 Z" fill="#FF0000" stroke="#CC0000" stroke-width="2"/>

  <!-- Car top -->
  <path d="M 100 60 L 110 30 L 190 30 L 200 60 Z" fill="#FF3333" stroke="#CC0000" stroke-width="2"/>

  <!-- Front bumper -->
  <rect x="50" y="90" width="30" height="15" rx="3" fill="#333333"/>

  <!-- Rear bumper -->
  <rect x="220" y="90" width="30" height="15" rx="3" fill="#333333"/>

  <!-- Front window -->
  <path d="M 105 35 L 120 60 L 150 60 L 145 35 Z" fill="#87CEEB" opacity="0.7" stroke="#4A90E2" stroke-width="1"/>

  <!-- Rear window -->
  <path d="M 150 60 L 180 60 L 185 35 L 155 35 Z" fill="#87CEEB" opacity="0.7" stroke="#4A90E2" stroke-width="1"/>

  <!-- Front wheel -->
  <circle cx="90" cy="110" r="18" fill="#222222" stroke="#333" stroke-width="2"/>
  <circle cx="90" cy="110" r="12" fill="#555555"/>
  <circle cx="90" cy="110" r="7" fill="#888888"/>

  <!-- Rear wheel -->
  <circle cx="230" cy="110" r="18" fill="#222222" stroke="#333" stroke-width="2"/>
  <circle cx="230" cy="110" r="12" fill="#555555"/>
  <circle cx="230" cy="110" r="7" fill="#888888"/>

  <!-- Headlights -->
  <ellipse cx="60" cy="85" rx="6" ry="8" fill="#FFFF00" stroke="#FFD700" stroke-width="1"/>
  <ellipse cx="75" cy="85" rx="6" ry="8" fill="#FFFF00" stroke="#FFD700" stroke-width="1"/>

  <!-- Taillights -->
  <ellipse cx="250" cy="85" rx="5" ry="7" fill="#FF0000"/>
  <ellipse cx="262" cy="85" rx="5" ry="7" fill="#FF0000"/>

  <!-- Racing stripes -->
  <rect x="145" y="60" width="10" height="35" fill="#FFFFFF" opacity="0.8"/>
</svg>
